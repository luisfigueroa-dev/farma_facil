name: farma_facil
description: "Sistema de Ventas para Farmacia - FarmaFacil"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  
  # Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Base de datos
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: any
  
  # PDF
  pdf: ^3.11.2
  printing: ^5.14.2
  
  # Utilidades
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  collection: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Drift code generation
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true